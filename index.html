<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="عکس با کد ملی">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b1120">
    <meta name="apple-touch-fullscreen" content="yes">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
    <title>وب‌اپ عکس با کد ملی</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }
        body {
            background: #0b1120;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
            color: #e2e8f0;
            -webkit-font-smoothing: antialiased;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-width: 460px;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: #1e293b;
            display: flex;
            flex-direction: column;
            padding: 20px 16px 24px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8);
            border: 1px solid #334155;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        /* حذف اسکرول‌بار در آیفون */
        .app-container::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
        /* حالت تمام‌صفحه در آیفون */
        @supports (padding: max(0px)) {
            .app-container {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(24px, env(safe-area-inset-bottom));
            }
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 span {
            font-size: 26px;
            -webkit-text-fill-color: initial;
        }
        .header .badge {
            background: #2563eb;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            letter-spacing: 0.3px;
            border: 1px solid #3b82f6;
            flex-shrink: 0;
        }
        .camera-frame {
            background: #0b1120;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2d3b52;
            box-shadow: inset 0 8px 16px rgba(0,0,0,0.6);
            flex-shrink: 0;
            min-height: 200px;
        }
        #video, #photoCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #0b1120;
        }
        #photoCanvas {
            display: none;
            border-radius: 26px;
        }
        .input-section {
            margin: 14px 0 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }
        .input-section label {
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 6px;
            padding-right: 6px;
        }
        .input-section label i {
            font-style: normal;
            background: #1e293b;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
        .input-field {
            background: #0f172a;
            border: 2px solid #2d3b52;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
            outline: none;
            transition: 0.2s;
            width: 100%;
            letter-spacing: 2px;
            text-align: center;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.25);
        }
        .input-field::placeholder {
            color: #475569;
            font-weight: 400;
            letter-spacing: 0.5px;
            font-size: 16px;
        }
        .status-bar {
            background: #0f172a;
            border-radius: 60px;
            padding: 10px 16px;
            text-align: center;
            font-size: 13px;
            margin: 8px 0 10px;
            color: #94a3b8;
            border: 1px solid #2d3b52;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
            font-weight: 450;
            line-height: 1.3;
            flex-shrink: 0;
        }
        .status-bar.success {
            color: #86efac;
            border-color: #16a34a;
            background: #0b1f12;
        }
        .status-bar.error {
            color: #fca5a5;
            border-color: #dc2626;
            background: #1f0f0f;
        }
        .status-bar.info {
            color: #93c5fd;
            border-color: #3b82f6;
            background: #0f1a2e;
        }
        .controls-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 4px 0 8px;
            flex-shrink: 0;
        }
        .btn {
            background: #2d3b52;
            border: none;
            border-radius: 60px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            color: #f8fafc;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1 1 auto;
            min-width: 90px;
            transition: all 0.15s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            border: 1px solid #475569;
            letter-spacing: 0.3px;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: #2563eb;
            border-color: #3b82f6;
            color: white;
        }
        .btn-primary:active { background: #1d4ed8; }
        .btn-success {
            background: #16a34a;
            border-color: #22c55e;
            color: white;
        }
        .btn-success:active { background: #15803d; }
        .btn-danger {
            background: #dc2626;
            border-color: #ef4444;
            color: white;
        }
        .btn-danger:active { background: #b91c1c; }
        .btn-share {
            background: #7c3aed;
            border-color: #8b5cf6;
            color: white;
        }
        .btn-share:active { background: #6d28d9; }
        .btn:disabled {
            opacity: 0.4;
            transform: scale(0.96);
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .btn-group-2 {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            flex-shrink: 0;
        }
        .btn-group-2 .btn {
            flex: 1;
        }
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #475569;
            margin-top: 12px;
            letter-spacing: 0.2px;
            border-top: 1px solid #1e293b;
            padding-top: 12px;
            flex-shrink: 0;
        }
        @media (max-width: 420px) {
            .app-container { padding: 12px 12px 16px; }
            .btn { min-width: 70px; padding: 10px 12px; font-size: 13px; }
            .input-field { font-size: 18px; padding: 12px 16px; }
            .header h1 { font-size: 19px; }
        }
        @media (min-height: 800px) {
            .camera-frame { min-height: 280px; }
        }
        /* حالت نمایش در مرورگر دسکتاپ */
        @media (display-mode: standalone) {
            .app-container {
                border: none;
                border-radius: 0;
            }
        }
        /* حالت نمایش در برنامه (PWA) */
        @media (display-mode: fullscreen) {
            .app-container {
                border: none;
                border-radius: 0;
            }
        }
        /* حالت نمایش در مرورگر معمولی */
        @media (display-mode: browser) {
            .app-container {
                border-radius: 40px;
                border: 1px solid #334155;
            }
            body {
                background: #0b1120;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" role="main">
    <!-- هدر -->
    <div class="header">
        <h1>
            <span>📸</span> کد ملی
        </h1>
        <div class="badge">وب‌اپ</div>
    </div>

    <!-- دوربین / کانواس -->
    <div class="camera-frame">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="photoCanvas"></canvas>
    </div>

    <!-- ورودی کد ملی -->
    <div class="input-section">
        <label for="nationalCode">
            🇮🇷 کد ملی (۱۰ رقم)
            <i>مثال: ۱۲۳۴۵۶۷۸۹۰</i>
        </label>
        <input type="text" id="nationalCode" class="input-field" inputmode="numeric" maxlength="10" placeholder="۱۲۳۴۵۶۷۸۹۰" value="" autocomplete="off">
    </div>

    <!-- وضعیت -->
    <div id="statusMessage" class="status-bar info">📱 درخواست دسترسی به دوربین...</div>

    <!-- دکمه‌های اصلی -->
    <div class="controls-grid">
        <button id="captureBtn" class="btn btn-primary">📸 عکس بگیر</button>
        <button id="retakeBtn" class="btn btn-danger" disabled>🔄 دوباره</button>
    </div>

    <!-- دکمه دانلود و اشتراک‌گذاری -->
    <div class="btn-group-2">
        <button id="downloadBtn" class="btn btn-success" disabled>
            ⬇️ دانلود
        </button>
        <button id="shareBtn" class="btn btn-share" disabled>
            🔗 اشتراک
        </button>
    </div>

    <div class="footer-note">
        • عکس با کیفیت بالا • نام فایل: کدملی_تاریخ.jpg
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ---- عناصر DOM ----
        const video = document.getElementById('video');
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const nationalCodeInput = document.getElementById('nationalCode');
        const statusDiv = document.getElementById('statusMessage');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const shareBtn = document.getElementById('shareBtn');

        // ---- state ----
        let mediaStream = null;
        let isCameraActive = false;
        let isPhotoTaken = false;
        let photoDataURL = null;
        let photoBlob = null;
        let cameraStarted = false;

        // ---- helpers ----
        function setStatus(msg, type = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status-bar';
            if (type === 'success') statusDiv.classList.add('success');
            else if (type === 'error') statusDiv.classList.add('error');
            else if (type === 'info') statusDiv.classList.add('info');
        }

        // ---- تبدیل dataURL به Blob ----
        function dataURLToBlob(dataURL) {
            const parts = dataURL.split(',');
            const mime = parts[0].match(/:(.*?);/)[1];
            const bstr = atob(parts[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) {
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new Blob([u8arr], { type: mime });
        }

        // ---- دریافت کد ملی معتبر ----
        function getValidNationalCode() {
            let rawCode = nationalCodeInput.value.trim();
            rawCode = rawCode.replace(/\D/g, '');
            if (rawCode.length === 10) {
                return rawCode;
            }
            return null;
        }

        // ---- ساخت نام فایل با کد ملی و تاریخ ----
        function generateFileName() {
            const code = getValidNationalCode();
            const codePart = code || 'unknown';
            const now = new Date();
            const datePart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            return `${codePart}_${datePart}.jpg`;
        }

        // ---- راه‌اندازی دوربین ----
        async function startCamera() {
            try {
                setStatus('📷 در حال دسترسی به دوربین...', 'info');
                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;
                await video.play();

                const track = mediaStream.getVideoTracks()[0];
                const settings = track.getSettings();
                const vw = settings.width || 1280;
                const vh = settings.height || 720;
                canvas.width = vw;
                canvas.height = vh;

                isCameraActive = true;
                cameraStarted = true;
                isPhotoTaken = false;
                photoDataURL = null;
                photoBlob = null;

                video.style.display = 'block';
                canvas.style.display = 'none';

                captureBtn.disabled = false;
                retakeBtn.disabled = true;
                downloadBtn.disabled = true;
                shareBtn.disabled = true;

                setStatus('✅ دوربین آماده است. عکس بگیرید.', 'success');
            } catch (err) {
                console.error('دوربین خطا:', err);
                setStatus('❌ دسترسی به دوربین ممکن نیست. (اجازه دسترسی را بررسی کنید)', 'error');
                isCameraActive = false;
                cameraStarted = false;
                captureBtn.disabled = true;
                retakeBtn.disabled = true;
                downloadBtn.disabled = true;
                shareBtn.disabled = true;
            }
        }

        // ---- توقف دوربین ----
        function stopCameraTracks() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            video.srcObject = null;
            isCameraActive = false;
        }

        // ---- گرفتن عکس ----
        function capturePhoto() {
            if (!isCameraActive || !video.videoWidth || !video.videoHeight) {
                setStatus('⚠️ دوربین آماده نیست. لطفاً صبر کنید.', 'error');
                return;
            }

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            canvas.width = vw;
            canvas.height = vh;
            ctx.drawImage(video, 0, 0, vw, vh);

            photoDataURL = canvas.toDataURL('image/jpeg', 0.95);
            photoBlob = dataURLToBlob(photoDataURL);

            video.style.display = 'none';
            canvas.style.display = 'block';

            isPhotoTaken = true;
            downloadBtn.disabled = false;
            shareBtn.disabled = false;
            retakeBtn.disabled = false;
            captureBtn.disabled = true;

            setStatus('✅ عکس گرفته شد. کد ملی را وارد و دانلود یا اشتراک‌گذاری کنید.', 'success');
        }

        // ---- دوباره (بازگشت به دوربین) ----
        function retakePhoto() {
            if (!isCameraActive || !cameraStarted) {
                stopCameraTracks();
                startCamera();
                return;
            }

            video.style.display = 'block';
            canvas.style.display = 'none';

            isPhotoTaken = false;
            photoDataURL = null;
            photoBlob = null;
            downloadBtn.disabled = true;
            shareBtn.disabled = true;
            retakeBtn.disabled = true;
            captureBtn.disabled = false;

            setStatus('🔄 دوربین فعال. آماده عکس‌برداری.', 'success');
        }

        // ---- دانلود با کد ملی ----
        function downloadWithCode() {
            if (!isPhotoTaken || !photoDataURL) {
                setStatus('⚠️ ابتدا عکس بگیرید.', 'error');
                return;
            }

            const code = getValidNationalCode();
            if (!code) {
                setStatus('⚠️ کد ملی باید دقیقاً ۱۰ رقم باشد.', 'error');
                return;
            }

            const fileName = generateFileName();
            const link = document.createElement('a');
            link.href = photoDataURL;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            setStatus(`✅ دانلود شد: "${fileName}"`, 'success');
        }

        // ---- اشتراک‌گذاری عکس با کد ملی در نام فایل ----
        async function sharePhoto() {
            if (!isPhotoTaken || !photoBlob) {
                setStatus('⚠️ ابتدا عکس بگیرید.', 'error');
                return;
            }

            if (!navigator.share) {
                setStatus('⚠️ مرورگر از اشتراک‌گذاری پشتیبانی نمی‌کند. از دکمه دانلود استفاده کنید.', 'error');
                return;
            }

            const code = getValidNationalCode();
            const codeDisplay = code || 'unknown';
            const fileName = generateFileName();

            try {
                const file = new File([photoBlob], fileName, { type: 'image/jpeg' });
                const shareData = {
                    title: 'عکس با کد ملی',
                    text: `عکس گرفته شده با کد ملی: ${codeDisplay}`,
                    files: [file]
                };

                await navigator.share(shareData);
                setStatus(`✅ عکس با نام "${fileName}" به اشتراک گذاشته شد.`, 'success');
            } catch (err) {
                if (err.name === 'AbortError') {
                    setStatus('ℹ️ اشتراک‌گذاری لغو شد.', 'info');
                } else {
                    console.error('خطا در اشتراک‌گذاری:', err);
                    setStatus('❌ خطا در اشتراک‌گذاری. لطفاً دوباره تلاش کنید.', 'error');
                }
            }
        }

        // ---- رویدادها ----
        captureBtn.addEventListener('click', capturePhoto);
        retakeBtn.addEventListener('click', retakePhoto);
        downloadBtn.addEventListener('click', downloadWithCode);
        shareBtn.addEventListener('click', sharePhoto);

        // ---- ورودی کد ملی (فقط عدد و محدودیت) ----
        nationalCodeInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });

        // ---- شروع اولیه ----
        startCamera();

        // ---- در صورت بسته شدن تب، استریم را آزاد کن ----
        window.addEventListener('beforeunload', function() {
            stopCameraTracks();
        });

        // ---- اگر دوربین به هر دلیل قطع شد ----
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // صفحه مخفی شد – کاری نمی‌کنیم
            } else {
                if (!isCameraActive && !isPhotoTaken) {
                    stopCameraTracks();
                    startCamera();
                }
                if (isCameraActive && !mediaStream) {
                    startCamera();
                }
            }
        });

        // ---- اگر ویدیو خطا داد ----
        video.addEventListener('error', (e) => {
            setStatus('❌ خطا در پخش ویدیو. دوباره تلاش کنید.', 'error');
            isCameraActive = false;
            captureBtn.disabled = true;
        });

        // ---- وقتی ویدیو آماده شد ----
        video.addEventListener('loadedmetadata', () => {
            if (video.videoWidth > 0 && video.videoHeight > 0) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                if (!isPhotoTaken) {
                    setStatus('📷 دوربین آماده است.', 'success');
                }
                isCameraActive = true;
                captureBtn.disabled = false;
            }
        });

        console.log('وب‌اپ عکس با کد ملی + اشتراک‌گذاری آماده است.');
    })();
</script>
</body>
</html>
