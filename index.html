<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>وب‌اپ عکس با کد ملی</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0b1120;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            color: #e2e8f0;
            -webkit-font-smoothing: antialiased;
        }
        .app-container {
            max-width: 460px;
            width: 100%;
            background: #1e293b;
            border-radius: 40px;
            padding: 24px 20px 30px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8);
            border: 1px solid #334155;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 0 4px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 span {
            font-size: 26px;
            -webkit-text-fill-color: initial;
        }
        .header .badge {
            background: #2563eb;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            border: 1px solid #3b82f6;
        }
        .camera-frame {
            background: #0b1120;
            border-radius: 32px;
            overflow: hidden;
            margin: 6px 0 16px;
            position: relative;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2d3b52;
            box-shadow: inset 0 8px 16px rgba(0,0,0,0.6);
        }
        #video, #photoCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #0b1120;
        }
        #photoCanvas {
            display: none;
            border-radius: 30px;
        }
        .controls-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 6px 0 12px;
        }
        .btn {
            background: #2d3b52;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1 1 auto;
            min-width: 110px;
            transition: all 0.15s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            border: 1px solid #475569;
            touch-action: manipulation;
            user-select: none;
        }
        .btn:active { transform: scale(0.94); }
        .btn-primary {
            background: #2563eb;
            border-color: #3b82f6;
            color: white;
        }
        .btn-primary:active { background: #1d4ed8; }
        .btn-danger {
            background: #dc2626;
            border-color: #ef4444;
            color: white;
        }
        .btn-danger:active { background: #b91c1c; }
        .btn:disabled {
            opacity: 0.4;
            transform: scale(0.96);
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .btn-share-zip {
            background: #7c3aed;
            border-color: #8b5cf6;
            color: white;
        }
        .btn-share-zip:active { background: #6d28d9; }
        .btn-share-pdf {
            background: #dc2626;
            border-color: #ef4444;
            color: white;
        }
        .btn-share-pdf:active { background: #b91c1c; }
        .btn-share-jpg {
            background: #16a34a;
            border-color: #22c55e;
            color: white;
        }
        .btn-share-jpg:active { background: #15803d; }
        .btn-download-jpg {
            background: #0ea5e9;
            border-color: #38bdf8;
            color: white;
        }
        .btn-download-jpg:active { background: #0284c7; }
        .input-section {
            margin: 18px 0 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-section label {
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 6px;
            padding-right: 6px;
        }
        .input-section label i {
            font-style: normal;
            background: #1e293b;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
        .input-field {
            background: #0f172a;
            border: 2px solid #2d3b52;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
            outline: none;
            transition: 0.2s;
            width: 100%;
            letter-spacing: 2px;
            text-align: center;
            font-family: inherit;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.25);
        }
        .input-field::placeholder {
            color: #475569;
            font-weight: 400;
            letter-spacing: 0.5px;
            font-size: 16px;
        }
        .status-bar {
            background: #0f172a;
            border-radius: 60px;
            padding: 12px 18px;
            text-align: center;
            font-size: 14px;
            margin: 14px 0 8px;
            color: #94a3b8;
            border: 1px solid #2d3b52;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            font-weight: 450;
            line-height: 1.4;
        }
        .status-bar.success {
            color: #86efac;
            border-color: #16a34a;
            background: #0b1f12;
        }
        .status-bar.error {
            color: #fca5a5;
            border-color: #dc2626;
            background: #1f0f0f;
        }
        .status-bar.info {
            color: #93c5fd;
            border-color: #3b82f6;
            background: #0f1a2e;
        }
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .action-row .btn {
            flex: 1;
            min-width: 0;
            padding: 14px 10px;
            font-size: 14px;
        }
        .share-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .share-row .btn {
            flex: 1;
            min-width: 0;
            padding: 14px 10px;
            font-size: 14px;
        }
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #475569;
            margin-top: 16px;
            border-top: 1px solid #1e293b;
            padding-top: 16px;
        }
        .section-label {
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            margin: 8px 0 4px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        @media (max-width: 420px) {
            .app-container { padding: 16px; }
            .btn { min-width: 80px; padding: 12px 14px; font-size: 14px; }
            .input-field { font-size: 18px; padding: 14px 16px; }
            .action-row .btn, .share-row .btn { font-size: 12px; padding: 12px 8px; }
        }
    </style>
</head>
<body>
<div class="app-container" role="main">
    <div class="header">
        <h1><span>📸</span> کد ملی</h1>
        <div class="badge">iPhone</div>
    </div>

    <div class="camera-frame">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="input-section">
        <label for="nationalCode">
            🇮🇷 کد ملی (۱۰ رقم)
            <i>مثال: ۱۲۳۴۵۶۷۸۹۰</i>
        </label>
        <input type="text" id="nationalCode" class="input-field" inputmode="numeric" maxlength="10" placeholder="۱۲۳۴۵۶۷۸۹۰" value="" autocomplete="off">
    </div>

    <div id="statusMessage" class="status-bar info">📱 درخواست دسترسی به دوربین...</div>

    <div class="controls-grid">
        <button id="captureBtn" class="btn btn-primary">📸 عکس بگیر</button>
        <button id="retakeBtn" class="btn btn-danger" disabled>🔄 دوباره</button>
    </div>

    <div class="section-label">⬇️ دانلود فایل</div>
    <div class="action-row">
        <button id="downloadJpgBtn" class="btn btn-download-jpg" disabled>🖼️ JPG</button>
        <button id="downloadZipBtn" class="btn btn-share-zip" disabled>📦 ZIP</button>
        <button id="downloadPdfBtn" class="btn btn-share-pdf" disabled>📄 PDF</button>
    </div>

    <div class="section-label">📤 اشتراک‌گذاری (Share)</div>
    <div class="share-row">
        <button id="shareJpgBtn" class="btn btn-share-jpg" disabled>🖼️ JPG</button>
        <button id="shareZipBtn" class="btn btn-share-zip" disabled>📦 ZIP</button>
        <button id="sharePdfBtn" class="btn btn-share-pdf" disabled>📄 PDF</button>
    </div>

    <div class="footer-note">
        • عکس با کیفیت بالا • نام فایل: کدملی_تاریخ
    </div>
</div>

<script>
    (function() {
        "use strict";

        const video = document.getElementById('video');
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const nationalCodeInput = document.getElementById('nationalCode');
        const statusDiv = document.getElementById('statusMessage');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        
        // دکمه‌های دانلود
        const downloadJpgBtn = document.getElementById('downloadJpgBtn');
        const downloadZipBtn = document.getElementById('downloadZipBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        
        // دکمه‌های اشتراک‌گذاری
        const shareJpgBtn = document.getElementById('shareJpgBtn');
        const shareZipBtn = document.getElementById('shareZipBtn');
        const sharePdfBtn = document.getElementById('sharePdfBtn');

        let mediaStream = null;
        let isCameraActive = false;
        let isPhotoTaken = false;
        let photoDataURL = null;
        let cameraStarted = false;

        function setStatus(msg, type = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status-bar';
            if (type === 'success') statusDiv.classList.add('success');
            else if (type === 'error') statusDiv.classList.add('error');
            else if (type === 'info') statusDiv.classList.add('info');
        }

        function getFormattedDate() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        }

        function getNationalCode() {
            let raw = nationalCodeInput.value.trim();
            raw = raw.replace(/\D/g, '');
            return raw;
        }

        function validateNationalCode() {
            const code = getNationalCode();
            if (code.length !== 10) {
                setStatus('⚠️ کد ملی باید دقیقاً ۱۰ رقم باشد.', 'error');
                return null;
            }
            return code;
        }

        async function startCamera() {
            try {
                setStatus('📷 در حال دسترسی به دوربین...', 'info');
                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;
                await video.play();

                const track = mediaStream.getVideoTracks()[0];
                const settings = track.getSettings();
                const vw = settings.width || 1280;
                const vh = settings.height || 720;
                canvas.width = vw;
                canvas.height = vh;

                isCameraActive = true;
                cameraStarted = true;
                isPhotoTaken = false;
                photoDataURL = null;

                video.style.display = 'block';
                canvas.style.display = 'none';

                captureBtn.disabled = false;
                retakeBtn.disabled = true;
                
                // غیرفعال کردن همه دکمه‌ها
                const allBtns = [downloadJpgBtn, downloadZipBtn, downloadPdfBtn, shareJpgBtn, shareZipBtn, sharePdfBtn];
                allBtns.forEach(b => b.disabled = true);

                setStatus('✅ دوربین آماده است. عکس بگیرید.', 'success');
            } catch (err) {
                console.error('دوربین خطا:', err);
                setStatus('❌ دسترسی به دوربین ممکن نیست.', 'error');
                isCameraActive = false;
                cameraStarted = false;
                captureBtn.disabled = true;
                retakeBtn.disabled = true;
                const allBtns = [downloadJpgBtn, downloadZipBtn, downloadPdfBtn, shareJpgBtn, shareZipBtn, sharePdfBtn];
                allBtns.forEach(b => b.disabled = true);
            }
        }

        function stopCameraTracks() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            video.srcObject = null;
            isCameraActive = false;
        }

        function capturePhoto() {
            if (!isCameraActive || !video.videoWidth || !video.videoHeight) {
                setStatus('⚠️ دوربین آماده نیست.', 'error');
                return;
            }

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            canvas.width = vw;
            canvas.height = vh;
            ctx.drawImage(video, 0, 0, vw, vh);

            photoDataURL = canvas.toDataURL('image/jpeg', 0.95);

            video.style.display = 'none';
            canvas.style.display = 'block';

            isPhotoTaken = true;
            
            // فعال کردن همه دکمه‌ها
            const allBtns = [downloadJpgBtn, downloadZipBtn, downloadPdfBtn, shareJpgBtn, shareZipBtn, sharePdfBtn];
            allBtns.forEach(b => b.disabled = false);
            
            retakeBtn.disabled = false;
            captureBtn.disabled = true;

            setStatus('✅ عکس گرفته شد. کد ملی را وارد و دانلود یا اشتراک‌گذاری کنید.', 'success');
        }

        function retakePhoto() {
            if (!isCameraActive || !cameraStarted) {
                stopCameraTracks();
                startCamera();
                return;
            }

            video.style.display = 'block';
            canvas.style.display = 'none';

            isPhotoTaken = false;
            photoDataURL = null;
            
            const allBtns = [downloadJpgBtn, downloadZipBtn, downloadPdfBtn, shareJpgBtn, shareZipBtn, sharePdfBtn];
            allBtns.forEach(b => b.disabled = true);
            
            retakeBtn.disabled = true;
            captureBtn.disabled = false;

            setStatus('🔄 دوربین فعال. آماده عکس‌برداری.', 'success');
        }

        // ===== تابع کمکی برای اشتراک‌گذاری =====
        function shareFile(blob, fileName, fileType) {
            if (!navigator.share) {
                setStatus('⚠️ مرورگر شما از اشتراک‌گذاری پشتیبانی نمی‌کند.', 'error');
                return;
            }

            const file = new File([blob], fileName, { type: fileType });
            
            navigator.share({
                files: [file],
                title: fileName,
                text: `فایل ${fileName}`
            }).then(() => {
                setStatus(`✅ فایل "${fileName}" با موفقیت به اشتراک گذاشته شد.`, 'success');
            }).catch((err) => {
                if (err.name !== 'AbortError') {
                    console.error('Share error:', err);
                    setStatus('❌ خطا در اشتراک‌گذاری فایل.', 'error');
                }
            });
        }

        // ===== تابع کمکی برای دانلود =====
        function downloadFile(blob, fileName) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 5000);
            setStatus(`✅ دانلود: "${fileName}"`, 'success');
        }

        // ===== تولید فایل‌ها =====
        function getFileData() {
            if (!isPhotoTaken || !photoDataURL) {
                setStatus('⚠️ ابتدا عکس بگیرید.', 'error');
                return null;
            }
            const code = validateNationalCode();
            if (!code) return null;
            return { code, datePart: getFormattedDate() };
        }

        function createJpgBlob() {
            const base64Data = photoDataURL.split(',')[1];
            const byteString = atob(base64Data);
            const bytes = new Uint8Array(byteString.length);
            for (let i = 0; i < byteString.length; i++) {
                bytes[i] = byteString.charCodeAt(i);
            }
            return new Blob([bytes], { type: 'image/jpeg' });
        }

        function createZipBlob() {
            return new Promise((resolve, reject) => {
                if (typeof JSZip === 'undefined') {
                    reject(new Error('کتابخانه ZIP بارگذاری نشد.'));
                    return;
                }
                const base64Data = photoDataURL.split(',')[1];
                const zip = new JSZip();
                zip.file('photo.jpg', base64Data, { base64: true });
                zip.generateAsync({ type: 'blob' }).then(resolve).catch(reject);
            });
        }

        function createPdfBlob() {
            return new Promise((resolve, reject) => {
                if (typeof window.jspdf === 'undefined') {
                    reject(new Error('کتابخانه PDF بارگذاری نشد.'));
                    return;
                }
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                
                const img = new Image();
                img.onload = function() {
                    const imgRatio = img.width / img.height;
                    const margin = 20;
                    const maxWidth = pageWidth - (margin * 2);
                    const maxHeight = pageHeight - (margin * 2);
                    
                    let finalWidth, finalHeight;
                    if (imgRatio > 1) {
                        finalWidth = maxWidth;
                        finalHeight = maxWidth / imgRatio;
                        if (finalHeight > maxHeight) {
                            finalHeight = maxHeight;
                            finalWidth = maxHeight * imgRatio;
                        }
                    } else {
                        finalHeight = maxHeight;
                        finalWidth = maxHeight * imgRatio;
                        if (finalWidth > maxWidth) {
                            finalWidth = maxWidth;
                            finalHeight = maxWidth / imgRatio;
                        }
                    }
                    
                    const x = (pageWidth - finalWidth) / 2;
                    const y = (pageHeight - finalHeight) / 2;
                    
                    pdf.addImage(photoDataURL, 'JPEG', x, y, finalWidth, finalHeight);
                    
                    const code = getNationalCode();
                    const datePart = getFormattedDate();
                    pdf.setFontSize(11);
                    pdf.setTextColor(80, 80, 80);
                    const text = `کد ملی: ${code}  |  تاریخ: ${datePart}`;
                    const textWidth = pdf.getStringUnitWidth(text) * 11 / pdf.internal.scaleFactor;
                    const textX = (pageWidth - textWidth) / 2;
                    pdf.text(text, textX, pageHeight - 8);
                    
                    resolve(pdf.output('blob'));
                };
                img.onerror = () => reject(new Error('بارگذاری تصویر برای PDF失敗'));
                img.src = photoDataURL;
            });
        }

        // ===== دانلودها =====
        function downloadJpg() {
            const data = getFileData();
            if (!data) return;
            const blob = createJpgBlob();
            downloadFile(blob, `${data.code}_${data.datePart}.jpg`);
        }

        function downloadZip() {
            const data = getFileData();
            if (!data) return;
            createZipBlob().then(blob => {
                downloadFile(blob, `${data.code}_${data.datePart}.zip`);
            }).catch(err => {
                setStatus('❌ ' + err.message, 'error');
            });
        }

        function downloadPdf() {
            const data = getFileData();
            if (!data) return;
            createPdfBlob().then(blob => {
                downloadFile(blob, `${data.code}_${data.datePart}.pdf`);
            }).catch(err => {
                setStatus('❌ ' + err.message, 'error');
            });
        }

        // ===== اشتراک‌گذاری‌ها =====
        function shareJpg() {
            const data = getFileData();
            if (!data) return;
            const blob = createJpgBlob();
            shareFile(blob, `${data.code}_${data.datePart}.jpg`, 'image/jpeg');
        }

        function shareZip() {
            const data = getFileData();
            if (!data) return;
            createZipBlob().then(blob => {
                shareFile(blob, `${data.code}_${data.datePart}.zip`, 'application/zip');
            }).catch(err => {
                setStatus('❌ ' + err.message, 'error');
            });
        }

        function sharePdf() {
            const data = getFileData();
            if (!data) return;
            createPdfBlob().then(blob => {
                shareFile(blob, `${data.code}_${data.datePart}.pdf`, 'application/pdf');
            }).catch(err => {
                setStatus('❌ ' + err.message, 'error');
            });
        }

        // ===== رویدادها =====
        captureBtn.addEventListener('click', capturePhoto);
        retakeBtn.addEventListener('click', retakePhoto);
        
        downloadJpgBtn.addEventListener('click', downloadJpg);
        downloadZipBtn.addEventListener('click', downloadZip);
        downloadPdfBtn.addEventListener('click', downloadPdf);
        
        shareJpgBtn.addEventListener('click', shareJpg);
        shareZipBtn.addEventListener('click', shareZip);
        sharePdfBtn.addEventListener('click', sharePdf);

        nationalCodeInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });

        startCamera();

        window.addEventListener('beforeunload', function() {
            stopCameraTracks();
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                if (!isCameraActive && !isPhotoTaken) {
                    stopCameraTracks();
                    startCamera();
                }
                if (isCameraActive && !mediaStream) {
                    startCamera();
                }
            }
        });

        video.addEventListener('error', (e) => {
            setStatus('❌ خطا در پخش ویدیو.', 'error');
            isCameraActive = false;
            captureBtn.disabled = true;
        });

        video.addEventListener('loadedmetadata', () => {
            if (video.videoWidth > 0 && video.videoHeight > 0) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                if (!isPhotoTaken) {
                    setStatus('📷 دوربین آماده است.', 'success');
                }
                isCameraActive = true;
                captureBtn.disabled = false;
            }
        });

        console.log('وب‌اپ عکس با کد ملی آماده است (دانلود + اشتراک‌گذاری)');
    })();
</script>
</body>
</html>
