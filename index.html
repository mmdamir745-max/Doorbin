<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>وب‌اپ عکس با کد ملی</title>
    <!-- JSZip از CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- jsPDF از CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0b1120;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            color: #e2e8f0;
            -webkit-font-smoothing: antialiased;
        }
        .app-container {
            max-width: 460px;
            width: 100%;
            background: #1e293b;
            border-radius: 40px;
            padding: 24px 20px 30px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8);
            border: 1px solid #334155;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 0 4px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 span {
            font-size: 26px;
            -webkit-text-fill-color: initial;
        }
        .header .badge {
            background: #2563eb;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            border: 1px solid #3b82f6;
        }
        .camera-frame {
            background: #0b1120;
            border-radius: 32px;
            overflow: hidden;
            margin: 6px 0 16px;
            position: relative;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2d3b52;
            box-shadow: inset 0 8px 16px rgba(0,0,0,0.6);
        }
        #video, #photoCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #0b1120;
        }
        #photoCanvas {
            display: none;
            border-radius: 30px;
        }
        .controls-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 6px 0 12px;
        }
        .btn {
            background: #2d3b52;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1 1 auto;
            min-width: 110px;
            transition: all 0.15s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            border: 1px solid #475569;
            touch-action: manipulation;
            user-select: none;
        }
        .btn:active { transform: scale(0.94); }
        .btn-primary {
            background: #2563eb;
            border-color: #3b82f6;
            color: white;
        }
        .btn-primary:active { background: #1d4ed8; }
        .btn-danger {
            background: #dc2626;
            border-color: #ef4444;
            color: white;
        }
        .btn-danger:active { background: #b91c1c; }
        .btn:disabled {
            opacity: 0.4;
            transform: scale(0.96);
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .btn-download-zip {
            background: #7c3aed;
            border-color: #8b5cf6;
            color: white;
        }
        .btn-download-zip:active { background: #6d28d9; }
        .btn-download-pdf {
            background: #dc2626;
            border-color: #ef4444;
            color: white;
        }
        .btn-download-pdf:active { background: #b91c1c; }
        .btn-download-jpg {
            background: #16a34a;
            border-color: #22c55e;
            color: white;
        }
        .btn-download-jpg:active { background: #15803d; }
        .input-section {
            margin: 18px 0 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-section label {
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 6px;
            padding-right: 6px;
        }
        .input-section label i {
            font-style: normal;
            background: #1e293b;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
        .input-field {
            background: #0f172a;
            border: 2px solid #2d3b52;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
            outline: none;
            transition: 0.2s;
            width: 100%;
            letter-spacing: 2px;
            text-align: center;
            font-family: inherit;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.25);
        }
        .input-field::placeholder {
            color: #475569;
            font-weight: 400;
            letter-spacing: 0.5px;
            font-size: 16px;
        }
        .status-bar {
            background: #0f172a;
            border-radius: 60px;
            padding: 12px 18px;
            text-align: center;
            font-size: 14px;
            margin: 14px 0 8px;
            color: #94a3b8;
            border: 1px solid #2d3b52;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            font-weight: 450;
            line-height: 1.4;
        }
        .status-bar.success {
            color: #86efac;
            border-color: #16a34a;
            background: #0b1f12;
        }
        .status-bar.error {
            color: #fca5a5;
            border-color: #dc2626;
            background: #1f0f0f;
        }
        .status-bar.info {
            color: #93c5fd;
            border-color: #3b82f6;
            background: #0f1a2e;
        }
        .download-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .download-row .btn {
            flex: 1;
            min-width: 0;
            padding: 14px 10px;
            font-size: 14px;
        }
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #475569;
            margin-top: 16px;
            border-top: 1px solid #1e293b;
            padding-top: 16px;
        }
        @media (max-width: 420px) {
            .app-container { padding: 16px; }
            .btn { min-width: 80px; padding: 12px 14px; font-size: 14px; }
            .input-field { font-size: 18px; padding: 14px 16px; }
            .download-row .btn { font-size: 12px; padding: 12px 8px; }
        }
    </style>
</head>
<body>
<div class="app-container" role="main">
    <div class="header">
        <h1><span>📸</span> کد ملی</h1>
        <div class="badge">iPhone</div>
    </div>

    <div class="camera-frame">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="input-section">
        <label for="nationalCode">
            🇮🇷 کد ملی (۱۰ رقم)
            <i>مثال: ۱۲۳۴۵۶۷۸۹۰</i>
        </label>
        <input type="text" id="nationalCode" class="input-field" inputmode="numeric" maxlength="10" placeholder="۱۲۳۴۵۶۷۸۹۰" value="" autocomplete="off">
    </div>

    <div id="statusMessage" class="status-bar info">📱 درخواست دسترسی به دوربین...</div>

    <div class="controls-grid">
        <button id="captureBtn" class="btn btn-primary">📸 عکس بگیر</button>
        <button id="retakeBtn" class="btn btn-danger" disabled>🔄 دوباره</button>
    </div>

    <div class="download-row">
        <button id="downloadJpgBtn" class="btn btn-download-jpg" disabled>🖼️ JPG</button>
        <button id="downloadZipBtn" class="btn btn-download-zip" disabled>📦 ZIP</button>
        <button id="downloadPdfBtn" class="btn btn-download-pdf" disabled>📄 PDF</button>
    </div>

    <div class="footer-note">
        • عکس با کیفیت بالا • نام فایل: کدملی_تاریخ
    </div>
</div>

<script>
    (function() {
        "use strict";

        const video = document.getElementById('video');
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const nationalCodeInput = document.getElementById('nationalCode');
        const statusDiv = document.getElementById('statusMessage');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const downloadJpgBtn = document.getElementById('downloadJpgBtn');
        const downloadZipBtn = document.getElementById('downloadZipBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');

        let mediaStream = null;
        let isCameraActive = false;
        let isPhotoTaken = false;
        let photoDataURL = null;
        let cameraStarted = false;

        function setStatus(msg, type = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status-bar';
            if (type === 'success') statusDiv.classList.add('success');
            else if (type === 'error') statusDiv.classList.add('error');
            else if (type === 'info') statusDiv.classList.add('info');
        }

        function getFormattedDate() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        }

        function getNationalCode() {
            let raw = nationalCodeInput.value.trim();
            raw = raw.replace(/\D/g, '');
            return raw;
        }

        function validateNationalCode() {
            const code = getNationalCode();
            if (code.length !== 10) {
                setStatus('⚠️ کد ملی باید دقیقاً ۱۰ رقم باشد.', 'error');
                return null;
            }
            return code;
        }

        async function startCamera() {
            try {
                setStatus('📷 در حال دسترسی به دوربین...', 'info');
                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;
                await video.play();

                const track = mediaStream.getVideoTracks()[0];
                const settings = track.getSettings();
                const vw = settings.width || 1280;
                const vh = settings.height || 720;
                canvas.width = vw;
                canvas.height = vh;

                isCameraActive = true;
                cameraStarted = true;
                isPhotoTaken = false;
                photoDataURL = null;

                video.style.display = 'block';
                canvas.style.display = 'none';

                captureBtn.disabled = false;
                retakeBtn.disabled = true;
                downloadJpgBtn.disabled = true;
                downloadZipBtn.disabled = true;
                downloadPdfBtn.disabled = true;

                setStatus('✅ دوربین آماده است. عکس بگیرید.', 'success');
            } catch (err) {
                console.error('دوربین خطا:', err);
                setStatus('❌ دسترسی به دوربین ممکن نیست.', 'error');
                isCameraActive = false;
                cameraStarted = false;
                captureBtn.disabled = true;
                retakeBtn.disabled = true;
                downloadJpgBtn.disabled = true;
                downloadZipBtn.disabled = true;
                downloadPdfBtn.disabled = true;
            }
        }

        function stopCameraTracks() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            video.srcObject = null;
            isCameraActive = false;
        }

        function capturePhoto() {
            if (!isCameraActive || !video.videoWidth || !video.videoHeight) {
                setStatus('⚠️ دوربین آماده نیست.', 'error');
                return;
            }

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            canvas.width = vw;
            canvas.height = vh;
            ctx.drawImage(video, 0, 0, vw, vh);

            photoDataURL = canvas.toDataURL('image/jpeg', 0.95);

            video.style.display = 'none';
            canvas.style.display = 'block';

            isPhotoTaken = true;
            downloadJpgBtn.disabled = false;
            downloadZipBtn.disabled = false;
            downloadPdfBtn.disabled = false;
            retakeBtn.disabled = false;
            captureBtn.disabled = true;

            setStatus('✅ عکس گرفته شد. کد ملی را وارد و دانلود کنید.', 'success');
        }

        function retakePhoto() {
            if (!isCameraActive || !cameraStarted) {
                stopCameraTracks();
                startCamera();
                return;
            }

            video.style.display = 'block';
            canvas.style.display = 'none';

            isPhotoTaken = false;
            photoDataURL = null;
            downloadJpgBtn.disabled = true;
            downloadZipBtn.disabled = true;
            downloadPdfBtn.disabled = true;
            retakeBtn.disabled = true;
            captureBtn.disabled = false;

            setStatus('🔄 دوربین فعال. آماده عکس‌برداری.', 'success');
        }

        // ===== دانلود JPG =====
        function downloadJpg() {
            if (!isPhotoTaken || !photoDataURL) {
                setStatus('⚠️ ابتدا عکس بگیرید.', 'error');
                return;
            }
            const code = validateNationalCode();
            if (!code) return;

            const datePart = getFormattedDate();
            const link = document.createElement('a');
            link.href = photoDataURL;
            link.download = `${code}_${datePart}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setStatus(`✅ دانلود JPG: "${code}_${datePart}.jpg"`, 'success');
        }

        // ===== دانلود ZIP با JSZip =====
        function downloadZip() {
            if (!isPhotoTaken || !photoDataURL) {
                setStatus('⚠️ ابتدا عکس بگیرید.', 'error');
                return;
            }
            const code = validateNationalCode();
            if (!code) return;

            // بررسی وجود JSZip
            if (typeof JSZip === 'undefined') {
                setStatus('❌ کتابخانه ZIP بارگذاری نشد. اتصال اینترنت را بررسی کنید.', 'error');
                return;
            }

            const datePart = getFormattedDate();
            const fileName = `${code}_${datePart}.jpg`;

            try {
                const base64Data = photoDataURL.split(',')[1];
                
                const zip = new JSZip();
                zip.file(fileName, base64Data, { base64: true });
                
                zip.generateAsync({ type: 'blob' }).then(function(content) {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = `${code}_${datePart}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                    
                    setStatus(`✅ دانلود ZIP: "${code}_${datePart}.zip"`, 'success');
                }).catch(function(err) {
                    console.error('ZIP error:', err);
                    setStatus('❌ خطا در ساخت فایل ZIP', 'error');
                });
            } catch (err) {
                console.error('ZIP error:', err);
                setStatus('❌ خطا در ساخت فایل ZIP', 'error');
            }
        }

        // ===== دانلود PDF با jsPDF =====
        function downloadPdf() {
            if (!isPhotoTaken || !photoDataURL) {
                setStatus('⚠️ ابتدا عکس بگیرید.', 'error');
                return;
            }
            const code = validateNationalCode();
            if (!code) return;

            // بررسی وجود jsPDF
            if (typeof window.jspdf === 'undefined') {
                setStatus('❌ کتابخانه PDF بارگذاری نشد. اتصال اینترنت را بررسی کنید.', 'error');
                return;
            }

            const datePart = getFormattedDate();
            const fileName = `${code}_${datePart}.pdf`;

            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();

                const imgData = photoDataURL;
                const img = new Image();
                img.onload = function() {
                    const imgRatio = img.width / img.height;
                    let finalWidth = pageWidth - 20;
                    let finalHeight = finalWidth / imgRatio;
                    
                    if (finalHeight > pageHeight - 20) {
                        finalHeight = pageHeight - 20;
                        finalWidth = finalHeight * imgRatio;
                    }
                    
                    const x = (pageWidth - finalWidth) / 2;
                    const y = (pageHeight - finalHeight) / 2;
                    
                    pdf.addImage(imgData, 'JPEG', x, y, finalWidth, finalHeight);
                    pdf.setFontSize(10);
                    pdf.setTextColor(100);
                    pdf.text(`کد ملی: ${code} - ${datePart}`, pageWidth/2, pageHeight - 10, { align: 'center' });
                    
                    const pdfBlob = pdf.output('blob');
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(pdfBlob);
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                    
                    setStatus(`✅ دانلود PDF: "${fileName}"`, 'success');
                };
                img.src = photoDataURL;
            } catch (err) {
                console.error('PDF error:', err);
                setStatus('❌ خطا در ساخت فایل PDF', 'error');
            }
        }

        // ===== رویدادها =====
        captureBtn.addEventListener('click', capturePhoto);
        retakeBtn.addEventListener('click', retakePhoto);
        downloadJpgBtn.addEventListener('click', downloadJpg);
        downloadZipBtn.addEventListener('click', downloadZip);
        downloadPdfBtn.addEventListener('click', downloadPdf);

        nationalCodeInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });

        startCamera();

        window.addEventListener('beforeunload', function() {
            stopCameraTracks();
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                if (!isCameraActive && !isPhotoTaken) {
                    stopCameraTracks();
                    startCamera();
                }
                if (isCameraActive && !mediaStream) {
                    startCamera();
                }
            }
        });

        video.addEventListener('error', (e) => {
            setStatus('❌ خطا در پخش ویدیو.', 'error');
            isCameraActive = false;
            captureBtn.disabled = true;
        });

        video.addEventListener('loadedmetadata', () => {
            if (video.videoWidth > 0 && video.videoHeight > 0) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                if (!isPhotoTaken) {
                    setStatus('📷 دوربین آماده است.', 'success');
                }
                isCameraActive = true;
                captureBtn.disabled = false;
            }
        });

        console.log('وب‌اپ عکس با کد ملی آماده است (JPG + ZIP + PDF)');
    })();
</script>
</body>
</html>
